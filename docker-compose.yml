services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: barberdb
      POSTGRES_USER: barber
      POSTGRES_PASSWORD: barber123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barber -d barberdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  barber-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/barberdb
      DATABASE_USERNAME: barber
      DATABASE_PASSWORD: barber123
      JWT_SECRET: dev-jwt-secret-key-para-local-minimo-32-caracteres-ok
      JWT_EXPIRATION: 3600000
      JWT_REFRESH_EXPIRATION: 604800000
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
